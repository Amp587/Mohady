<!DOCTYPE html>
<html>
<head>
<title>GAME RAKSASA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0;background:linear-gradient(#1e3c72,#2a5298);overflow:hidden;font-family:'Arial Black';user-select:none;height:100vh}
html,body{height:100%}
#c{display:block;width:100%;height:100vh}
#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);color:yellow;font-size:24px;text-shadow:2px 2px black;z-index:5;text-align:center;white-space:nowrap}
#credit{position:absolute;top:45px;left:50%;transform:translateX(-50%);color:#00ffff;font-size:22px;font-weight:bold;text-shadow:3px 3px black;z-index:5;font-style:italic;text-align:center}
#sizeBar{position:absolute;top:80px;left:50%;transform:translateX(-50%);width:250px;height:18px;background:#333;border:3px solid white;border-radius:10px;z-index:5}
#sizeFill{height:100%;background:linear-gradient(yellow,orange);border-radius:8px;width:0%}
.btn{position:absolute;bottom:25px;width:95px;height:95px;background:rgba(0,0,0,0.9);color:white;border:4px solid white;border-radius:25px;font-size:34px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:none}
#btnKiri{left:20px;}
#btnKanan{left:125px;}
#btnTembak{right:20px;width:120px;height:120px;background:rgba(255,0,0,1);font-size:20px}
.btnKecil{position:absolute;top:15px;width:95px;height:55px;background:rgba(0,150,0,0.9);color:white;border:3px solid white;border-radius:15px;font-size:18px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:none}
#btnStart{right:115px;}
#btnStop{right:15px;width:95px;height:55px;background:rgba(255,0,0,0.9);font-size:18px}
.btn:active,.btnKecil:active{background:rgba(255,255,0,1);transform:scale(0.9)}
</style>
</head>
<body>
<div id="hud"> Skor: 0 | Peluru: 999</div>
<div id="credit">by Mohady</div>
<div id="sizeBar"><div id="sizeFill"></div></div>
<div id="btnKiri" class="btn">◀️</div>
<div id="btnKanan" class="btn">▶️</div>
<div id="btnTembak" class="btn">TEMBAK</div>
<div id="btnStart" class="btnKecil">START</div>
<div id="btnStop" class="btnKecil">STOP</div>
<canvas id="c"></canvas>
<script>
let c = document.getElementById('c');
let x = c.getContext('2d');

// VARIABEL Game


let ukuran = 1;


function resize(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// CEK APAKAH HP
let isMobile = window.innerWidth < 768;

let px = c.width/2;
let py = c.height - 180;
 
let kill = 0;
let musuh = [], peluru = [], boom = [], salju = [], skor = 0, nyawa = 100, darahItem = []; ammo = 999;
 
let gerakKiri = false, gerakKanan = false, gameJalan = false;
let spawnMusuh;

for(let i=0; i<100; i++){
  salju.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*3+1, s:Math.random()*2+1, w:Math.random()*0.5-0.25})
}

let audioCtx;
function suara(tipe){
  if(!gameJalan) return;
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  if(tipe=='tembak'){o.type='square';o.frequency.value=1000;g.gain.setValueAtTime(0.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.05)}
  if(tipe=='kena'){o.type='sawtooth';o.frequency.value=150;g.gain.setValueAtTime(0.5,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.2)}
  if(tipe=='isi'){o.type='sine';o.frequency.value=600;g.gain.setValueAtTime(0.4,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.2)}
  if(tipe=='raksasa'){o.type='sawtooth';o.frequency.value=80;g.gain.setValueAtTime(0.8,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.8)}
  o.start(); o.stop(audioCtx.currentTime+0.8);
}

function gambarPlayer(px,py){
  let scale = ukuran;
  let w = 28 * scale;
  let h = 35 * scale;
  let kakiY = py; // Kaki paten di py
   py = kakiY-h/2;// geser titik tengah ke atas
  x.strokeStyle='#FFFF00'; x.lineWidth=5*scale;
  x.fillStyle='#FFFF00';
  
  // Topi
  x.fillRect(px-w/2, kakiY-h-3, w, 8*scale);
  
  // Kepala
  x.beginPath(); x.arc(px, kakiY-h+13, 12*scale, 0, 6.28); x.fill(); x.stroke();
  
  // Badan
  x.fillRect(px-w/3, kakiY-h+25, w*0.66, h*0.85);
  
  // Tangan kiri
  x.beginPath(); x.moveTo(px-w/3, kakiY-h+30); x.lineTo(px-w-5, kakiY-h+45); x.stroke();
  // Tangan kanan
  x.beginPath(); x.moveTo(px+w/3, kakiY-h+30); x.lineTo(px+w+5, kakiY-h+45); x.stroke();
  
  // Kaki kiri
  x.beginPath(); x.moveTo(px-w/3, kakiY-h+25+h*0.85); x.lineTo(px-w/2, kakiY); x.stroke();
  // Kaki kanan
  x.beginPath(); x.moveTo(px+w/3, kakiY-h+25+h*0.85); x.lineTo(px+w/2, kakiY); x.stroke();
}
function gambarMusuh(px,py){
  x.strokeStyle='#FF69B4'; x.lineWidth=3;
  x.beginPath(); x.arc(px, py-25, 10, 0, 6.28); x.stroke();
  x.beginPath(); x.moveTo(px-6, py-28); x.lineTo(px-10, py-38); x.stroke();
  x.beginPath(); x.moveTo(px+6, py-28); x.lineTo(px+10, py-38); x.stroke();
  x.beginPath(); x.moveTo(px, py-15); x.lineTo(px, py+15); x.stroke();
  x.beginPath(); x.moveTo(px, py-5); x.lineTo(px-12, py+5); x.stroke();
  x.beginPath(); x.moveTo(px, py-5); x.lineTo(px+12, py+5); x.stroke();
  x.beginPath(); x.moveTo(px, py+15); x.lineTo(px-8, py+35); x.stroke();
  x.beginPath(); x.moveTo(px, py+15); x.lineTo(px+8, py+35); x.stroke();
}

function ledakan(px,py){
  suara('kena');
  for(let i=0; i<25; i++) boom.push({x:px, y:py, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:35})
}

function updateHUD(){
  // Update bar + HUD versi lama
  document.getElementById('sizeFill').style.width = (ukuran/3*100) + '%';
  document.getElementById('hud').innerText = 'Skor: ' + skor + ' | Peluru: ' + ammo;
}
  
function setGerak(kiri,kanan){ if(gameJalan){gerakKiri=kiri; gerakKanan=kanan} }

document.getElementById('btnKiri').addEventListener('touchstart',e=>{e.preventDefault(); setGerak(true,false)});
document.getElementById('btnKiri').addEventListener('touchend',e=>{e.preventDefault(); setGerak(false,false)});
document.getElementById('btnKiri').onmousedown=()=>setGerak(true,false);
document.getElementById('btnKiri').onmouseup=()=>setGerak(false,false);

document.getElementById('btnKanan').addEventListener('touchstart',e=>{e.preventDefault(); setGerak(false,true)});
document.getElementById('btnKanan').addEventListener('touchend',e=>{e.preventDefault(); setGerak(false,false)});
document.getElementById('btnKanan').onmousedown=()=>setGerak(false,true);
document.getElementById('btnKanan').onmouseup=()=>setGerak(false,false);

document.getElementById('btnTembak').addEventListener('touchstart',e=>{e.preventDefault(); tembak()});
document.getElementById('btnTembak').onmousedown=()=>tembak();

document.getElementById('btnStart').onclick=startGame;
document.getElementById('btnStart').ontouchstart=e=>{e.preventDefault(); startGame()};
document.getElementById('btnStop').onclick=stopGame;
document.getElementById('btnStop').ontouchstart=e=>{e.preventDefault(); stopGame()};

function startGame(){
  if(gameJalan) return;
  gameJalan=true; skor=0; ammo=999; musuh=[]; peluru=[]; boom=[];
  ukuran=1; kill=0; px=c.width/2; py=c.height-180;
  document.getElementById('sizeFill').style.width = '0%';
  for(let i=0; i<5; i++) musuh.push({x:Math.random()*c.width, y:-Math.random()*300, w:30, h:60, s:3+Math.random()*4})
  
  // KECEPATAN SPAWN: HP LEBIH LAMA
  let spawnSpeed = isMobile ? 400 : 180; // HP 400ms, PC 180ms
  
  spawnMusuh = setInterval(()=>{
    if(gameJalan){
      musuh.push({x:Math.random()*c.width, y:-80, w:30, h:60, s:3+Math.random()*4})
      // DI HP CUMA SPAWN 1, DI PC BISA 2
      if(!isMobile && Math.random()<0.5) musuh.push({x:Math.random()*c.width, y:-80, w:30, h:60, s:3+Math.random()*4})
    }
  }, spawnSpeed);
  main();
}

function stopGame(){
  gameJalan=false; clearInterval(spawnMusuh);
  x.clearRect(0,0,c.width,c.height);
  x.fillStyle='rgba(0,0,0,0.7)'; x.fillRect(0,0,c.width,c.height);
  x.fillStyle='white'; x.font='40px Arial Black'; x.textAlign='center';
  x.fillText('GAME DI STOP', c.width/2, c.height/2-20);
  x.font='24px Arial'; x.fillText('Skor Akhir: '+skor, c.width/2, c.height/2+20);
  x.font='20px Arial'; x.fillText('Create by Mohady', c.width/2, c.height/2+50);
}

function tembak(){
  if(ammo>0 && gameJalan){
    peluru.push({x:px, y:py-30-20*ukuran});
    ammo--;
    suara('tembak');
  }
}

function main(){
  if(!gameJalan) return;
  requestAnimationFrame(main);

  x.clearRect(0,0,c.width,c.height);
  x.fillStyle='#0a1a3a'; x.fillRect(0,0,c.width,c.height);
  x.fillStyle='#004080'; x.fillRect(0,c.height-80,c.width,80);

  x.fillStyle='white';
  salju.forEach(s=>{
    x.beginPath(); x.arc(s.x,s.y,s.r,0,6.28); x.fill();
    s.y+=s.s; s.x+=s.w;
    if(s.y>c.height){s.y=0; s.x=Math.random()*c.width;}
  })

 // SPAWN ITEM DARAH
if(Math.random() < 0.02){ 
    darahItem.push({x: Math.random()*c.width, y: 0, r: 12});
}

// GAMBAR + CEK AMBIL DARAH
for(let i=darahItem.length-1; i>=0; i--){
    let d = darahItem[i];
    d.y += 2; // jatuh ke bawah
    
    // gambar hati merah
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
    ctx.fill();
    
    // KALAU KENA PLAYER
    if(Math.hypot(px-d.x, py-d.y) < 25){
        hp = Math.min(100, hp + 20); // <- INI "hp + 20"
        ukuran += 0.2;
        py = c.height - 180 * ukuran; // biar kaki napak
        darahItem.splice(i,1);
    }
    if(d.y > c.height) darahItem.splice(i,1);
} 
  let kecepatan = 10 - ukuran*2;
  if(gerakKiri && px > 30*ukuran) px -= kecepatan;
  if(gerakKanan && px < c.width - 30*ukuran) px += kecepatan;

  gambarPlayer(px, py);

  x.fillStyle='orange';
  peluru.forEach((p,i)=>{p.y-=22; x.beginPath(); x.arc(p.x,p.y,6,0,6.28); x.fill();});

  musuh.forEach((m,i)=>{m.y+=m.s; gambarMusuh(m.x+m.w/2, m.y+30);});

  boom.forEach((b,i)=>{b.x+=b.vx; b.y+=b.vy; b.life--; x.fillStyle=`rgba(255,200,0,${b.life/35})`; x.beginPath(); x.arc(b.x,b.y,14,0,6.28); x.fill()});

  peluru.forEach((p,pi)=>{
    musuh.forEach((m,mi)=>{
      if(p.x>m.x && p.x<m.x+m.w && p.y>m.y && p.y<m.y+m.h){
        ledakan(m.x+15,m.y+30); peluru.splice(pi,1); musuh.splice(mi,1); skor+=10*ukuran;
        ammo+=3; if(ammo>999) ammo=999; suara('isi');
        kill++; cekNaikLevel();
      }
    })
  })

  musuh = musuh.filter(m=>m.y<c.height+80);
  peluru = peluru.filter(p=>p.y>0);
  boom = boom.filter(b=>b.life>0);

  let status = '';
  if(ukuran==2) status = ' ';
  if(ukuran==3) status = ' [RAKSASA]';
  document.getElementById('hud').innerText = `Skor: ${skor} | Peluru: ${ammo}${status}`;
}
</script>
</body>
</html>
