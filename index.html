<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter V2 - Mohady</title>
<style>
    body { margin: 0; background: #000; overflow: hidden; color: white; font-family: 'Arial'; }
    canvas { display: block; background: linear-gradient(to bottom, #000, #110022); }
    #ui { position: absolute; top: 10px; left: 10px; font-size: 18px; text-shadow: 0 0 5px #0ff; }
    #credit { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 14px; color: #0ff; }
    #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    #start button { padding: 15px 30px; font-size: 20px; background: #0ff; border: none; color: #000; cursor: pointer; border-radius: 10px; }
</style>
</head>
<body>
<div id="ui">Skor: <span id="skor">0</span> | Level: <span id="level">1</span> | Nyawa: <span id="nyawa">3</span></div>
<div id="credit">by Mohady V2</div>
<div id="start">
    <h1>🚀 SPACE SHOOTER V2 🚀</h1>
    <p>Tombol: A/D atau ← → untuk gerak | Spasi untuk nembak</p>
    <button onclick="mulai()">MULAI GAME</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, peluru, musuh, peluruMusuh, partikel, bintang;
let skor = 0, level = 1, nyawa = 3, gameJalan = false;
let tombol = {};

// 1. PLAYER
function buatPlayer(){
    player = { x: canvas.width/2, y: canvas.height-60, w: 40, h: 40, speed: 7, cd: 0 };
}

// 2. BINTANG BACKGROUND
function buatBintang(){
    bintang = [];
    for(let i=0; i<150; i++){
        bintang.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*0.5+0.2});
    }
}

// 3. MUSUH + LEVEL
function spawnMusuh(){
    musuh = [];
    let jumlah = 5 + level * 2;
    for(let i=0; i<jumlah; i++){
        let jenis = 'normal';
        if(level >= 3 && i % 3 == 0) jenis = 'cepat';
        if(level >= 6 && i % 4 == 0) jenis = 'penembak';
        if(level >= 10 && i % 5 == 0) jenis = 'raksasa';

        musuh.push({
            x: Math.random()*(canvas.width-40), 
            y: Math.random()*100, 
            w: jenis=='raksasa'?60:40, 
            h: jenis=='raksasa'?60:40,
            speed: jenis=='cepat'?3:1.5, 
            hp: jenis=='raksasa'?5:1,
            jenis: jenis,
            cdTembak: Math.random()*100
        });
    }
}

// 4. TEMBAK PLAYER - BIRU
function tembak(){
    if(player.cd <= 0){
        peluru.push({x: player.x+player.w/2-2, y: player.y, w: 4, h: 15, speed: 10, col: '#00aaff'});
        player.cd = 15;
    }
}

// 5. TEMBAK MUSUH - KUNING BOLA
function tembakMusuh(m){
    if(m.jenis == 'raksasa'){
        for(let i=-1;i<=1;i++){ // tembak 3 sekaligus
            peluruMusuh.push({x:m.x+m.w/2+i*15, y:m.y+m.h, r:8, speed:3, col:'#ffff00'});
        }
    }else{
        peluruMusuh.push({x:m.x+m.w/2, y:m.y+m.h, r:5, speed:4, col:'#ffff00'});
    }
}

// 6. LOOP UTAMA
function loop(){
    if(!gameJalan) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Gambar bintang
    bintang.forEach(b => {
        b.y += b.s;
        if(b.y > canvas.height) b.y = 0;
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.28); ctx.fill();
    });

    // Gerak player
    if(tombol['a'] || tombol['ArrowLeft']) player.x -= player.speed;
    if(tombol['d'] || tombol['ArrowRight']) player.x += player.speed;
    player.x = Math.max(0, Math.min(canvas.width-player.w, player.x));
    if(player.cd > 0) player.cd--;

    // Gambar player
    ctx.fillStyle = '#00aaff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x+player.w/2-2, player.y-10, 4, 10);

    // Update peluru player
    peluru.forEach((p,i) => {
        p.y -= p.speed;
        ctx.fillStyle = p.col;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        if(p.y < 0) peluru.splice(i,1);
    });

    // Update musuh
    musuh.forEach((m,i) => {
        m.y += m.speed;
        m.cdTembak--;
        
        // Gambar musuh beda warna
        if(m.jenis=='cepat') ctx.fillStyle='#ff00ff';
        else if(m.jenis=='penembak') ctx.fillStyle='#0088ff';
        else if(m.jenis=='raksasa') ctx.fillStyle='#ff0000';
        else ctx.fillStyle='#ff6600';
        ctx.fillRect(m.x, m.y, m.w, m.h);

        // Musuh nembak
        if((m.jenis=='penembak' || m.jenis=='raksasa') && m.cdTembak <= 0){
            tembakMusuh(m);
            m.cdTembak = 100 - level*5;
        }
        
        // Tabrak player
        if(m.y+m.h > player.y && m.x < player.x+player.w && m.x+m.w > player.x){
            nyawa--; updateUI(); musuh.splice(i,1);
        }
        if(m.y > canvas.height) musuh.splice(i,1);
    });

    // Update peluru musuh - BOLA KUNING
    peluruMusuh.forEach((p,i) => {
        p.y += p.speed;
        ctx.fillStyle = p.col;
        ctx.beginPath(); // <-- INI BIKIN JADI BOLA
        ctx.arc(p.x, p.y, p.r, 0, 6.28);
        ctx.fill();
        
        if(p.y > canvas.height) peluruMusuh.splice(i,1);
        // Kena player
        if(p.y > player.y && p.x > player.x && p.x < player.x+player.w){
            nyawa--; updateUI(); peluruMusuh.splice(i,1);
        }
    });

    // Tabrakan peluru vs musuh
    peluru.forEach((p,pi) => {
        musuh.forEach((m,mi) => {
            if(p.x > m.x && p.x < m.x+m.w && p.y > m.y && p.y < m.y+m.h){
                m.hp--;
                if(m.hp <= 0){
                    skor += m.jenis=='raksasa'?50:10;
                    musuh.splice(mi,1);
                }
                peluru.splice(pi,1);
                updateUI();
            }
        });
    });

    // Naik level
    if(musuh.length == 0){
        level++; spawnMusuh(); updateUI();
    }

    // Game over
    if(nyawa <= 0){ 
        gameJalan = false; 
        alert('GAME OVER! Skor: ' + skor);
        document.getElementById('start').style.display = 'block';
    }

    requestAnimationFrame(loop);
}

function updateUI(){
    document.getElementById('skor').innerText = skor;
    document.getElementById('level').innerText = level;
    document.getElementById('nyawa').innerText = nyawa;
}

function mulai(){
    skor=0; level=1; nyawa=3; peluru=[]; musuh=[]; peluruMusuh=[]; partikel=[];
    buatPlayer(); buatBintang(); spawnMusuh(); updateUI();
    document.getElementById('start').style.display = 'none';
    gameJalan = true; loop();
}

// Kontrol
document.addEventListener('keydown', e => { tombol[e.key] = true; if(e.key==' ') tembak(); });
document.addEventListener('keyup', e => { tombol[e.key] = false; });

</script>
</body>
</html>
